name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install API dependencies
        run: pip install fastapi uvicorn pydantic

      - name: Build Docker image
        run: docker build -t market-prediction-api .

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd realtime-market-prediction-system
            git pull origin main
            docker stop market-api || true
            docker rm market-api || true
            docker build -t market-prediction-api .
            docker run -d -p 8000:8000 --name market-api market-prediction-api