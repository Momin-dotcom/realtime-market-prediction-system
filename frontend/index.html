<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 5px;
            border: 1px solid #ddd;
            display: none;
        }
        .up { color: green; font-weight: bold; font-size: 24px; }
        .down { color: red; font-weight: bold; font-size: 24px; }
        .loading { color: gray; }
    </style>
</head>
<body>
    <h1>📈 Market Direction Predictor</h1>
    <p>Enter a stock symbol to predict market direction</p>

    <input id="symbol-input" type="text" placeholder="e.g. AAPL, GOOGL, TSLA, MSFT" />
    <br>
    <button onclick="predict()">Predict</button>

    <div id="result">
        <h3>Prediction for <span id="symbol"></span></h3>
        <p>Direction: <span id="direction"></span></p>
        <p>Confidence: <span id="confidence"></span></p>
        <hr>
        <p>LSTM: <span id="lstm"></span></p>
        <p>GRU: <span id="gru"></span></p>
        <p>RNN: <span id="rnn"></span></p>
    </div>

    <script>
        async function predict() {
            const symbol = document.getElementById("symbol-input").value.trim();
            if (!symbol) {
                alert("Please enter a stock symbol");
                return;
            }

            document.getElementById("result").style.display = "block";
            document.getElementById("direction").textContent = "Loading...";
            document.getElementById("direction").className = "loading";

            try {
                const response = await fetch("http://51.20.114.83:8000/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ symbol: symbol })
                });

                const data = await response.json();

                document.getElementById("symbol").textContent = data.symbol;
                document.getElementById("direction").textContent = data.direction;
                document.getElementById("direction").className = data.direction.includes("UP") ? "up" : "down";
                document.getElementById("confidence").textContent = data.confidence + "%";
                document.getElementById("lstm").textContent = data.lstm_prediction;
                document.getElementById("gru").textContent = data.gru_prediction;
                document.getElementById("rnn").textContent = data.rnn_prediction;

            } catch (error) {
                document.getElementById("direction").textContent = "Error connecting to API";
            }
        }
    </script>
</body>
</html>
