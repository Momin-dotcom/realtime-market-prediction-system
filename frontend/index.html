<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 5px;
            border: 1px solid #ddd;
            display: none;
        }
        .up { color: green; font-weight: bold; }
        .down { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Market Direction Predictor</h1>
    <p>Paste recent financial news below to predict market direction</p>

    <textarea id="news-input" placeholder="Paste financial news or headlines here..."></textarea>
    <br>
    <button onclick="predict()">Predict Market Direction</button>

    <div id="result">
        <h3>Prediction Result</h3>
        <p>Direction: <span id="direction"></span></p>
        <p>Confidence: <span id="confidence"></span></p>
        <p>Sentiment: <span id="sentiment"></span></p>
    </div>

    <script>
        async function predict() {
            const text = document.getElementById("news-input").value;
            if (!text) {
                alert("Please enter some news text first");
                return;
            }

            try {
                const response = await fetch("http://localhost:8000/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                document.getElementById("direction").textContent = data.direction.toUpperCase();
                document.getElementById("direction").className = data.direction === "up" ? "up" : "down";
                document.getElementById("confidence").textContent = (data.confidence * 100).toFixed(1) + "%";
                document.getElementById("sentiment").textContent = data.sentiment;
                document.getElementById("result").style.display = "block";

            } catch (error) {
                alert("Could not connect to API. Make sure the server is running.");
            }
        }
    </script>
</body>
</html>
